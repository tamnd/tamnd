name: metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github:
    runs-on: ubuntu-latest
    steps:
      - name: overview (commits, prs, issues, activity)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tamnd
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Ho_Chi_Minh
          plugin_followup: yes
          plugin_followup_sections: repositories, user

      - name: commit calendar (isometric, full year)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tamnd
          filename: metrics.calendar.svg
          base: ""
          config_timezone: Asia/Ho_Chi_Minh
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: code changes (lines added and removed)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tamnd
          filename: metrics.lines.svg
          base: ""
          config_timezone: Asia/Ho_Chi_Minh
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_lines_repositories_limit: 0

      - name: languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tamnd
          filename: metrics.languages.svg
          base: ""
          config_timezone: Asia/Ho_Chi_Minh
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
